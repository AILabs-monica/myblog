<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <rect x="200" y="20" width="500" height="60" rx="30" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="450" y="58" text-anchor="middle" fill="white" font-size="22" font-weight="bold">AI Agent 搭建个人博客流程图</text>

  <!-- Step 1: 搭框架 -->
  <rect x="250" y="120" width="400" height="80" rx="12" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="450" y="152" text-anchor="middle" fill="white" font-size="18" font-weight="bold">第一步：搭框架</text>
  <text x="450" y="180" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">Next.js + MDX + Tailwind CSS</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="200" x2="450" y2="250" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2: 导入历史文章 -->
  <rect x="250" y="255" width="400" height="100" rx="12" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="450" y="287" text-anchor="middle" fill="white" font-size="18" font-weight="bold">第二步：导入历史文章</text>
  <text x="450" y="315" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">AI 批量导入 → 生成 .mdx 文件</text>
  <text x="450" y="338" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">自动写 frontmatter（标题/日期/描述/标签）</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="355" x2="450" y2="405" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3: 同步新文章 -->
  <rect x="250" y="410" width="400" height="80" rx="12" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="450" y="442" text-anchor="middle" fill="white" font-size="18" font-weight="bold">第三步：同步新文章</text>
  <text x="450" y="470" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">创建 .mdx → 写 frontmatter → 放到对应目录</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="490" x2="450" y2="540" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 4: 调样式 -->
  <rect x="250" y="545" width="400" height="100" rx="12" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="450" y="577" text-anchor="middle" fill="white" font-size="18" font-weight="bold">第四步：调样式（最折腾）</text>
  <text x="450" y="605" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">Tailwind 默认 → Bulma 尝试 → 回 Tailwind 微调</text>
  <text x="450" y="628" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">消耗 ~10 万 token（约 ¥14）</text>

  <!-- Arrow 4→5 -->
  <line x1="450" y1="645" x2="450" y2="695" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 5: 部署上线 -->
  <rect x="250" y="700" width="400" height="100" rx="12" fill="url(#g5)" filter="url(#shadow)"/>
  <text x="450" y="732" text-anchor="middle" fill="white" font-size="18" font-weight="bold">第五步：部署上线</text>
  <text x="450" y="760" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">Git 初始化 → GitHub 推送 → Vercel 自动部署</text>
  <text x="450" y="783" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">博客上线 + 流程固化为 skill</text>

  <!-- Arrow 5→Bug -->
  <line x1="650" y1="750" x2="720" y2="750" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <!-- Bug note -->
  <rect x="725" y="710" width="150" height="80" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="735" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="bold">发现的 Bug</text>
  <text x="800" y="760" text-anchor="middle" fill="#dc2626" font-size="11">同天文章排序随机</text>
  <text x="800" y="778" text-anchor="middle" fill="#dc2626" font-size="11">需精确到时分秒</text>

  <!-- Bottom summary box -->
  <rect x="100" y="860" width="700" height="90" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="892" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">几点感受</text>
  <text x="450" y="915" text-anchor="middle" fill="#475569" font-size="12">AI 能帮你把活干完，但活干得好不好，还是得自己过一遍</text>
  <text x="450" y="938" text-anchor="middle" fill="#475569" font-size="12">工具降低了门槛，但标准不能降——阅读体验是核心，持续优化</text>

  <!-- Decoration: side nodes -->
  <circle cx="160" cy="160" r="28" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="160" y="166" text-anchor="middle" fill="#4338ca" font-size="20" font-weight="bold">1</text>

  <circle cx="160" cy="305" r="28" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="160" y="311" text-anchor="middle" fill="#047857" font-size="20" font-weight="bold">2</text>

  <circle cx="160" cy="450" r="28" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="160" y="456" text-anchor="middle" fill="#4338ca" font-size="20" font-weight="bold">3</text>

  <circle cx="160" cy="595" r="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="601" text-anchor="middle" fill="#b45309" font-size="20" font-weight="bold">4</text>

  <circle cx="160" cy="750" r="28" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="160" y="756" text-anchor="middle" fill="#be185d" font-size="20" font-weight="bold">5</text>

  <!-- GitHub link -->
  <text x="450" y="990" text-anchor="middle" fill="#64748b" font-size="12">GitHub: github.com/AILabs-monica/myblog</text>
</svg>
